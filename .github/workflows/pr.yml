name: CI - Check Types, Lint, Tests

on:
  pull_request:
    branches:
      - main

jobs:
  tsc:
    name: tsc
    runs-on: ubuntu-latest
    env:
      BRO_NPM_TOKEN: ${{ secrets.BRO_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@brobrew'
      - run: npm ci
      - run: npm run tsc

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      BRO_NPM_TOKEN: ${{ secrets.BRO_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@brobrew'
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    env:
      BRO_NPM_TOKEN: ${{ secrets.BRO_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@brobrew'
      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    env:
      BRO_NPM_TOKEN: ${{ secrets.BRO_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@brobrew'
      - run: npm ci
      - run: npm run test:integration
